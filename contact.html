<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <section>
    <div class="text-center mb-16">
        <span class="inline-block px-5 py-2 bg-blue-100 text-blue-700 rounded-full text-sm  mb-4">            GET IN TOUCH
</span>
        
        <h1 class="text-6xl font-bold mb-10"> Let's Build Something Amazing Together</h1>
        <p class="text-2xl text-gray-600">Connect with our team to discuss your project, explore solutions, or learn how we can help transform your digital vision into reality.</p>
    </div>
    <div class="grid lg:grid-cols-2 gap-12">
        <div class="bg-white rounded-2xl shadow-lg p-8">
        <h1 class="text-4xl font-bold mb-10">Send Us a Message</h1>
        <p class="text-xl text-gray-600">Fill out the form below and we'll get back to you within 24 hours.</p>

        <form action=""> 
     <div class="grid md:grid-cols-2 gap-6" > 
        <div >
            <label for=" First Name" class="block text-xl font-medium  mb-1"> First Name</label>
            <input type="text" id="FirstName" name="FirstName" class="w-full border border-gray-300 rounded-md p-3 focus:outline-none  focus:ring-blue-500 " placeholder="John">
        </div>
        <div>
            <label for="Last Name" class="block text-xl font-medium  mb-1">Last Name</label>
            <input type="text" id="LastName" name="LastName" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500 transition" placeholder="Doe">
        </div> 
    </div>
    <div>
        <label for="Email" class="block text-xl font-medium  mb-1">Email address</label>
        <input type="email" id="Email" name="Email" class="w-full border border-gray-300 rounded-md p-3 focus:outline-none  focus:ring-blue-500 " placeholder="hello@example.com">

    </div>
    
</div>
     <div>
    </div>
        
        </form>
            </div>
    </div>


    </section>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <form action="">
        Name:<input type="text" placeholder="Full Name" required>
        Email: <input type="email" placeholder="Enter your password">
        Password: <input type="password">
        age : <input type="number" max="100" min="1">
        phone : <input type="tel" maxlength="11" minlength="9">
        url: <input type="url" placeholder="google.com">
        data : <input type="date">
        time : <input type="time">
        color: <input type="color">
        range: <input type="range" min="2" max="100" step="5">

        file: <input type="file" accept=".jpg.,png,.pdf">
        checkbox: <input type="checkbox" id="agree" >
        <label for="agree">I agree to the terms</label>
        
        
        <!-- name aautai hunu parxa for male rw female 1 time ma aauta click  -->
        male: <input type="radio" name="gender" >
        female: <input type="radio" name="gender" >
        other: <input type="radio" name="gender" >


        search: <input type="search" placeholder="search...">

        <input type="reset">
        <input type="submit">
    </form>
    
</body>
</html>
